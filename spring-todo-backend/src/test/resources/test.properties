# Test configuration — overrides production SQLite with H2 in-memory database
# Ensures complete isolation between test classes (create-drop rebuilds tables fresh)

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Docker Compose auto-start in tests
spring.docker.compose.enabled=false

# JWT test secret (must be at least 32 characters)
jwt.secret=TestSecretKeyThatIsAtLeast32CharactersLong!!

# CORS configuration
cors.allowed-origins=http://localhost:4200
