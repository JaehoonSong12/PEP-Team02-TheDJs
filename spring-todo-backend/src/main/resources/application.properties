spring.application.name=todomanagement
# [Added property] Added as instructed to configure SQLite database URL
spring.datasource.url=jdbc:sqlite:todo.db
# [Added property] Added as instructed to configure SQLite JDBC driver class
spring.datasource.driver-class-name=org.sqlite.JDBC
# [Added property] Added as instructed to configure SQLite dialect for Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# [Modified] Changed from create-drop to update so data persists across restarts
spring.jpa.hibernate.ddl-auto=update
# [Added property] Added as instructed to enable SQL query logging
spring.jpa.show-sql=true
# [Added property] Added as instructed to format logged SQL queries
spring.jpa.properties.hibernate.format_sql=true
# [Added property] Disabling Docker Compose support as SQLite is used locally
spring.docker.compose.enabled=false
# JWT secret (must be at least 32 characters)
jwt.secret=YourSecretKeyThatIsAtLeast32CharactersLong
# CORS
cors.allowed-origins=http://localhost:4200
